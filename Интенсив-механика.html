<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр по физике</title>

    <!-- Настройка MathJax для идеального рендера формул -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']] },
            chtml: { scale: 1.1 }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a; /* Более тёмный и контрастный цвет текста */
            --correct-color: #10b981;
            --wrong-color: #ef4444;
        }

        body {
            /* Используем более плотный и читаемый шрифт */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 500; /* Делаем текст менее тонким */
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.7; /* Увеличили межстрочный интервал для легкого чтения */
            font-size: 1.05rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-weight: 800;
        }

        .task-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }

        .task-header {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 16px;
            color: var(--primary-color);
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }

        .task-text {
            margin-bottom: 20px;
        }

        .image-container {
            margin: 20px 0;
            text-align: center;
            background-color: #f1f5f9;
            border: 1px dashed #cbd5e1;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            background-color: #f8fafc;
            border: 2px solid #cbd5e1;
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background-color: #eff6ff;
        }

        .option-btn.selected {
            background-color: #dbeafe;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .option-btn.correct {
            background-color: var(--correct-color) !important;
            color: white !important;
            border-color: var(--correct-color) !important;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color) !important;
            color: white !important;
            border-color: var(--wrong-color) !important;
        }

        .actions-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 14px 24px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 700;
            flex: 1;
            min-width: 180px;
        }

        .check-btn {
            background-color: var(--primary-color);
        }

        .check-btn:hover { background-color: var(--primary-hover); }
        .check-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        .solution-toggle-btn {
            background-color: #f59e0b;
            display: none;
        }

        .solution-toggle-btn:hover { background-color: #d97706; }

        .solution-box {
            display: none;
            margin-top: 24px;
            background-color: #f0fdf4;
            border: 2px solid #bbf7d0;
            padding: 24px;
            border-radius: 8px;
            color: #166534;
        }

        .solution-box.visible {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        .solution-box h4 {
            margin-top: 0;
            color: #15803d;
            margin-bottom: 16px;
            font-size: 1.15rem;
            font-weight: 800;
        }

        .svg-solution {
            display: block;
            margin: 20px auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            body { padding: 12px; font-size: 1rem; }
            .task-card { padding: 18px; }
            .options-grid { grid-template-columns: 1fr; }
            .actions-group { flex-direction: column; }
            .action-btn { width: 100%; }
        }
    </style>
</head>
<body>

                image: null,
                options: ["4,2 м/с", "4,4 м/с", "4,6 м/с", "4,8 м/с", "5,0 м/с"],

                solution: "Средняя скорость вычисляется как отношение всего пройденного пути ко всему затраченному времени:<br>$$ v_{\\text{ср}} = \\frac{S}{t_1 + t_2 + t_3} $$<br>Скорость на втором участке необходимо перевести в СИ: \\(v_2 = 10,8 \\text{ км/ч} = 3 \\text{ м/с}\\). Время прохождения каждой трети пути можно выразить как \\(t_i = \\frac{S/3}{v_i}\\). Подставим эти значения в исходную формулу:<br>$$ v_{\\text{ср}} = \\frac{S}{\\frac{S}{3 \\cdot 5} + \\frac{S}{3 \\cdot 3} + \\frac{S}{3 \\cdot 7}} = \\frac{1}{\\frac{1}{15} + \\frac{1}{9} + \\frac{1}{21}} $$<br>Приведя дроби к общему знаменателю (315), получаем ответ:<br>$$ v_{\\text{ср}} = \\frac{315}{21 + 35 + 15} = \\frac{315}{71} \\approx 4,43 \\text{ м/с} $$<br>Округляя, получаем \\(4,4 \\text{ м/с}\\)."

                solution: "Свяжем кинетическую энергию тела с его импульсом с помощью стандартной формулы \\(W_{\\text{к}} = \\frac{p^2}{2m}\\). Отсюда необходимый импульс тела, который нужно набрать, равен:<br>$$ p = \\sqrt{2m W_{\\text{к}}} = \\sqrt{2 \\cdot 0,5 \\cdot 81,0} = 9 \\text{ кг}\\cdot\\text{м/с} $$<br>Согласно теореме об изменении импульса, приобретенный импульс равен импульсу силы. Геометрически импульс силы представляет собой площадь под графиком зависимости силы от времени \\(F_x(t)\\). Нам нужно найти такой момент времени, при котором площадь фигуры под графиком станет равна 9.<br><br>Считаем площадь частями:<br>За первую секунду (от 0 до 1 с) график образует прямоугольник площадью \\(1 \\cdot 2 = 2\\).<br>За вторую секунду (от 1 до 2 с) график образует трапецию площадью \\(\\frac{2+4}{2} \\cdot 1 = 3\\).<br>Таким образом, к концу второй секунды суммарно накоплен импульс \\(2 + 3 = 5\\).<br><br>До требуемого импульса 9 нам не хватает еще 4. На участке времени после 2 секунд сила постоянна и равна 4 Н. Чтобы набрать дополнительную площадь 4 прямоугольником высотой 4, потребуется дополнительное время:<br>$$ \\Delta t = \\frac{4}{4} = 1 \\text{ с} $$<br>Общее время с начала движения составит \\(2 \\text{ с} + 1 \\text{ с} = 3,00 \\text{ с}\\)."
            },
            {
                text: "К невесомой нерастяжимой нити подвешен груз массой \\(m = 30 \\text{ кг}\\). Если нить с грузом отклонить на угол \\(\\alpha = 90^\\circ\\) от вертикали и отпустить, то в момент прохождения грузом низшей точки траектории модуль силы натяжения \\(F\\) нити равен:",
                image: null,
                options: ["0,10 кН", "0,20 кН", "0,40 кН", "0,50 кН", "0,90 кН"],
                correct: 4,
                solution: "Груз отпустили из строго горизонтального положения, поэтому высота падения до нижней точки равна длине нити \\(L\\). По закону сохранения механической энергии, вся потенциальная энергия в верхней точке полностью перейдет в кинетическую в низшей точке траектории:<br>$$ mgL = \\frac{mv^2}{2} \\implies v^2 = 2gL $$<br>В низшей точке на груз действуют направленная вертикально вверх сила натяжения нити \\(F\\) и направленная вниз сила тяжести \\(mg\\). Так как груз движется по дуге окружности, у него присутствует центростремительное ускорение. Запишем второй закон Ньютона:<br>$$ F - mg = m \\frac{v^2}{L} $$<br>Подставим выражение для квадрата скорости в это уравнение:<br>$$ F - mg = m \\frac{2gL}{L} = 2mg $$<br>Таким образом, сила натяжения нити составит \\(F = mg + 2mg = 3mg\\). То есть при падении маятника с угла 90 градусов натяжение нити в нижней точке всегда в 3 раза больше силы тяжести.<br><br>Вычислим точное значение:<br>$$ F = 3 \\cdot 30 \\cdot 10 = 900 \\text{ Н} = 0,90 \\text{ кН} $$"

        const container = document.getElementById('tasks-container');

        // Генерация карточек задач
        tasks.forEach((task, index) => {
            const taskNumber = index + 1;

            const card = document.createElement('div');
            card.className = 'task-card';

            const header = document.createElement('div');
            header.className = 'task-header';
            header.textContent = `Задача № ${taskNumber}`;
            card.appendChild(header);

            const textContent = document.createElement('div');
            textContent.className = 'task-text';
            textContent.innerHTML = task.text;
            card.appendChild(textContent);

            if (task.image) {
                const imgContainer = document.createElement('div');
                imgContainer.className = 'image-container';
                imgContainer.innerHTML = task.image;
                card.appendChild(imgContainer);
            }

            const optionsGrid = document.createElement('div');
            optionsGrid.className = 'options-grid';

            let isAnswered = false;
            let selectedBtn = null;
            let buttonElements = [];

            // Создаем кнопки с вариантами
            task.options.forEach((optText, optIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<b>${optIndex + 1})</b> ${optText}`;

                btn.addEventListener('click', function() {
                    if (isAnswered) return;
                    buttonElements.forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedBtn = { button: this, index: optIndex };
                });

                buttonElements.push(btn);
                optionsGrid.appendChild(btn);
            });

            card.appendChild(optionsGrid);

            const actionsGroup = document.createElement('div');
            actionsGroup.className = 'actions-group';

            const checkBtn = document.createElement('button');
            checkBtn.className = 'action-btn check-btn';
            checkBtn.textContent = 'Проверить ответ';

            const solutionToggleBtn = document.createElement('button');
            solutionToggleBtn.className = 'action-btn solution-toggle-btn';
            solutionToggleBtn.textContent = 'Показать решение';

            const solutionBox = document.createElement('div');
            solutionBox.className = 'solution-box';
            solutionBox.innerHTML = `<h4>Разбор решения:</h4>${task.solution}`;

            // Логика кнопки "Проверить"
            checkBtn.addEventListener('click', () => {
                if (isAnswered) return;

                if (!selectedBtn) {
                    alert('Пожалуйста, выберите вариант ответа перед проверкой.');
                    return;
                }

                isAnswered = true;
                checkBtn.style.display = 'none';

                buttonElements.forEach(btn => btn.disabled = true);

                if (selectedBtn.index === task.correct) {
                    selectedBtn.button.classList.add('correct');
                } else {
                    selectedBtn.button.classList.add('wrong');
                    buttonElements[task.correct].classList.add('correct');
                }

                solutionToggleBtn.style.display = 'block';
            });

            // Логика кнопки "Показать решение"
            solutionToggleBtn.addEventListener('click', () => {
                if (solutionBox.classList.contains('visible')) {
                    solutionBox.classList.remove('visible');
                    solutionToggleBtn.textContent = 'Показать решение';
                } else {
                    solutionBox.classList.add('visible');
                    solutionToggleBtn.textContent = 'Скрыть решение';
                }
            });

            actionsGroup.appendChild(checkBtn);
            actionsGroup.appendChild(solutionToggleBtn);
            card.appendChild(actionsGroup);
            card.appendChild(solutionBox);
            container.appendChild(card);
        });

        // Запуск MathJax для обработки всех сгенерированных формул
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch((err) => console.error('MathJax error:', err));
        }
    </script>
</body>
