    <style>
        :root {

        h1 { text-align: center; color: var(--primary-color); margin-bottom: 20px; font-weight: 800; }

        .nav-menu a { text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin: 0 5px; transition: 0.2s; display: inline-block; margin-bottom: 10px; }
        .nav-menu a.active { background-color: var(--primary-color); color: white; }
        .nav-menu a:not(.active) { background-color: #cbd5e1; color: var(--text-main); }
        .nav-menu a:not(.active):hover { background-color: #94a3b8; }

        .task-card { background-color: var(--card-bg); border-radius: 12px; padding: 24px; margin-bottom: 28px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; overflow: hidden; }
        .task-header { font-weight: 700; font-size: 1.25rem; margin-bottom: 16px; color: var(--primary-color); border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .task-text { margin-bottom: 20px; overflow-wrap: break-word; word-wrap: break-word; }
        .hint { font-size: 0.95rem; color: #64748b; font-weight: 600; display: block; margin-top: 10px; }

        .image-container { margin: 20px 0; text-align: center; background-color: #f1f5f9; border: 1px dashed #cbd5e1; padding: 20px; border-radius: 8px; overflow-x: auto; }
        
        .options-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        .text-input { width: 100%; max-width: 300px; padding: 14px 16px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1.1rem; font-weight: 600; color: var(--text-main); outline: none; transition: border-color 0.2s; }
        .text-input:focus { border-color: var(--primary-color); }
        .text-input.correct { background-color: var(--correct-color) !important; color: white !important; border-color: var(--correct-color) !important; }
        .text-input.wrong { background-color: var(--wrong-color) !important; color: white !important; border-color: var(--wrong-color) !important; }

        .actions-group { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
        .action-btn { padding: 14px 24px; color: white; border: none; border-radius: 8px; font-size: 1.05rem; cursor: pointer; transition: background-color 0.2s; font-weight: 700; flex: 1; min-width: 180px; text-align: center; }
        .check-btn { background-color: var(--primary-color); }
        .check-btn:hover { background-color: var(--primary-hover); }
        .check-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .solution-toggle-btn { background-color: #f59e0b; display: none; }
        .solution-toggle-btn:hover { background-color: #d97706; }

        .solution-box { display: none; margin-top: 24px; background-color: #f0fdf4; border: 2px solid #bbf7d0; padding: 24px; border-radius: 8px; color: #166534; overflow-x: auto; overflow-wrap: break-word; word-wrap: break-word; }
        .solution-box.visible { display: block; animation: fadeIn 0.4s ease-out; }
        .solution-box h4 { margin-top: 0; color: #15803d; margin-bottom: 16px; font-size: 1.15rem; font-weight: 800; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { body { padding: 12px; font-size: 1rem; } .task-card { padding: 18px; } .actions-group { flex-direction: column; } .action-btn { width: 100%; } }

        // БАЗА ДАННЫХ ЗАДАЧ И РЕШЕНИЙ
        const tasks = [
            {
                text: "Однородная линейка \\(OB\\) (рис. 125) массой \\(m_0 = 50 \\text{ г}\\) подвешена на двух вертикальных нитях. В точке \\(A\\) к линейке на легкой нити подвешен груз массой \\(m = 80 \\text{ г}\\). Определите модуль силы натяжения нити \\(CB\\), если линейка расположена горизонтально. <span class='hint'>(В ответе укажите только число в ньютонах)</span>",
                image: svg125,
                correct: ["0.45", "0,45"],
                solution: "Для нахождения силы натяжения правой нити запишем правило моментов относительно левого края линейки (точки \\(O\\)), чтобы исключить из уравнения неизвестную силу натяжения левой нити.<br><br>На рисунке линейка разделена штрихами на 4 равных прямоугольника. Обозначим длину всей линейки за \\(L\\). Тогда расстояние от точки \\(O\\) до точки \\(A\\) равно \\(\\frac{L}{4}\\).<br>Центр тяжести однородной линейки находится ровно посередине, то есть на расстоянии \\(\\frac{L}{2}\\) от точки \\(O\\).<br><br>Вращающие моменты относительно точки \\(O\\):<br>1. Сила тяжести груза \\(mg\\) тянет вниз на плече \\(\\frac{L}{4}\\). Вращает по часовой стрелке.<br>2. Сила тяжести линейки \\(m_0g\\) тянет вниз на плече \\(\\frac{L}{2}\\). Вращает по часовой стрелке.<br>3. Искомая сила натяжения нити \\(T\\) тянет вверх за правый край. Её плечо равно \\(L\\). Вращает против часовой стрелки.<br><br>Уравнение моментов:<br>$$ T \\cdot L = mg \\cdot \\frac{L}{4} + m_0g \\cdot \\frac{L}{2} $$<br>Сократим уравнение на общую длину \\(L\\):<br>$$ T = \\frac{mg}{4} + \\frac{m_0g}{2} $$<br>Переведем массы в килограммы (\\(m = 0,08 \\text{ кг}\\), \\(m_0 = 0,05 \\text{ кг}\\)) и подставим значения:<br>$$ T = \\frac{0,08 \\cdot 10}{4} + \\frac{0,05 \\cdot 10}{2} = \\frac{0,8}{4} + \\frac{0,5}{2} = 0,2 + 0,25 = 0,45 \\text{ Н} $$"
            },
            {
                text: "На рисунке 128 изображен однородный уравновешенный рычаг, подвешенный в точке \\(O\\). К нему приложены силы, модули которых \\(F_1 = 10 \\text{ Н}\\) и \\(F_2 = 8 \\text{ Н}\\). Длины \\(l_1 = 80 \\text{ см}\\), \\(l_2 = 60 \\text{ см}\\). Определите массу рычага. <span class='hint'>(В ответе укажите только число в килограммах)</span>",
                image: svg128,
                correct: ["0.8", "0,8"],
                solution: "Запишем правило моментов относительно точки опоры (подвеса) \\(O\\).<br>Полная длина рычага \\(l_1 = 80 \\text{ см}\\). Так как рычаг однородный, его центр масс находится посередине. Плечо силы тяжести самого рычага \\(m_0g\\) относительно правой опоры \\(O\\) равно \\(\\frac{l_1}{2} = 40 \\text{ см}\\).<br><br>На рычаг действуют три силы, создающие вращающие моменты относительно \\(O\\):<br>1. Сила \\(F_1\\) (направлена вверх на левом краю) имеет плечо \\(l_1\\). Вращает по часовой стрелке.<br>2. Сила \\(F_2\\) (направлена вниз) имеет плечо \\(l_2\\). Вращает против часовой стрелки.<br>3. Сила тяжести рычага \\(m_0g\\) (направлена вниз из центра) имеет плечо \\(\\frac{l_1}{2}\\). Вращает против часовой стрелки.<br><br>Составим уравнение:<br>$$ F_1 \\cdot l_1 = F_2 \\cdot l_2 + m_0g \\cdot \\frac{l_1}{2} $$<br>Переведем сантиметры в метры (\\(l_1 = 0,8 \\text{ м}\\), \\(l_2 = 0,6 \\text{ м}\\)) и подставим известные величины:<br>$$ 10 \\cdot 0,8 = 8 \\cdot 0,6 + m_0 \\cdot 10 \\cdot \\frac{0,8}{2} $$<br>$$ 8 = 4,8 + m_0 \\cdot 4 \\implies 4 m_0 = 8 - 4,8 = 3,2 $$<br>$$ m_0 = \\frac{3,2}{4} = 0,8 \\text{ кг} $$"
            },

                text: "На рисунке 130 изображен однородный уравновешенный рычаг, подвешенный в точке \\(O\\). К нему приложены силы \\(\\vec{F}_1\\) и \\(\\vec{F}_2\\). Модуль силы \\(F_1 = 2,0 \\text{ Н}\\). Длины \\(l_1 = 1,2 \\text{ м}\\), \\(l_2 = 20 \\text{ см}\\). Определите модуль силы \\(F_2\\), если масса рычага \\(m_0 = 0,52 \\text{ кг}\\). <span class='hint'>(В ответе укажите только число в ньютонах)</span>",

            const header = document.createElement('div');
            header.className = 'task-header';
            header.textContent = `Задача № ${taskNumber}`;
            card.appendChild(header);

            const textContent = document.createElement('div');
            textContent.className = 'task-text';
            textContent.innerHTML = task.text;
            card.appendChild(textContent);

            if (task.image) {
                const imgContainer = document.createElement('div');
                imgContainer.className = 'image-container';
                imgContainer.innerHTML = task.image;
                card.appendChild(imgContainer);
            }

            const optionsGrid = document.createElement('div');
            optionsGrid.className = 'options-grid';

            let isAnswered = false;
            let inputElement = document.createElement('input');
            inputElement.type = 'text';
            inputElement.className = 'text-input';
            inputElement.placeholder = 'Введите ваш ответ...';
            optionsGrid.appendChild(inputElement);

            card.appendChild(optionsGrid);

            const actionsGroup = document.createElement('div');
            actionsGroup.className = 'actions-group';

            const checkBtn = document.createElement('button');
            checkBtn.className = 'action-btn check-btn';
            checkBtn.textContent = 'Проверить ответ';

            const solutionToggleBtn = document.createElement('button');
            solutionToggleBtn.className = 'action-btn solution-toggle-btn';
            solutionToggleBtn.textContent = 'Показать решение';

            const solutionBox = document.createElement('div');
            solutionBox.className = 'solution-box';
            solutionBox.innerHTML = `<h4>Разбор решения:</h4>${task.solution}`;

            checkBtn.addEventListener('click', () => {
                if (isAnswered) return;
                
                let userVal = inputElement.value.trim().replace(',', '.');
                if (userVal === '') { alert('Пожалуйста, введите ответ в поле.'); return; }
                
                isAnswered = true;
                inputElement.disabled = true;

                let isCorrect = task.correct.includes(userVal) || task.correct.includes(userVal.replace('.', ','));

                if (isCorrect) {
                    inputElement.classList.add('correct');
                } else {
                    inputElement.classList.add('wrong');
                    let correctText = task.correct[0].replace('.', ',');
                    solutionBox.innerHTML = `<h4>Разбор решения:</h4><p style="color:var(--wrong-color); font-weight:bold;">Правильный ответ: ${correctText}</p>${task.solution}`;
                }

                checkBtn.style.display = 'none';
                solutionToggleBtn.style.display = 'block';
                
                if (window.MathJax && MathJax.typesetPromise) {
                    MathJax.typesetPromise([solutionBox]);
                }
            });

            solutionToggleBtn.addEventListener('click', () => {
                if (solutionBox.classList.contains('visible')) {
                    solutionBox.classList.remove('visible');
                    solutionToggleBtn.textContent = 'Показать решение';
                } else {
                    solutionBox.classList.add('visible');
                    solutionToggleBtn.textContent = 'Скрыть решение';
                }
            });

            actionsGroup.appendChild(checkBtn);
            actionsGroup.appendChild(solutionToggleBtn);
            card.appendChild(actionsGroup);
            card.appendChild(solutionBox);
            container.appendChild(card);
        });

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise().catch((err) => console.error('MathJax error:', err));
